name: "TAM-VAN-PHUC-AI-FACTORY-2026"

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

# ÉP NODE 24 Ở CẤP ĐỘ TOÀN CỤC
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  production-line:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # ÉP NODE 24 Ở CẤP ĐỘ JOB
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Engines
        run: pip install -q google-genai beautifulsoup4 requests

      - name: Market Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/scanner.py

      - name: Factory Production
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
        run: python scripts/factory.py

      - name: Deploy to Projects
        run: |
          git config --global user.name "Tam-Van-Phuc-AI-Manager"
          git config --global user.email "manager@tamvanphuc.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🚀 Auto-Pilot Update: $(date)"
            git push
          fi
