name: "TAM-VAN-PHUC-AI-FACTORY: 2026 Master Hub"

on:
  schedule:
    # Tự động vận hành vào 00:00 mỗi sáng thứ Hai (giờ UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Nút bấm kích hoạt thủ công bất cứ lúc nào

env:
  # Ép toàn bộ hệ thống chạy trên Node.js 24 để xóa sạch cảnh báo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  production-line:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quyền quan trọng để AI có thể lưu file vào GitHub
      
    steps:
      - name: 📥 Bước 1: Tiếp nhận hạ tầng (Checkout)
        uses: actions/checkout@v4

      - name: 🐍 Bước 2: Khởi động môi trường Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Bước 3: Cài đặt các công cụ kỹ thuật
        run: |
          pip install -q google-genai beautifulsoup4 requests

      - name: 🔍 Bước 4: Chạy bộ máy quét thị trường (Scanner)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/scanner.py

      - name: 🏭 Bước 5: Sản xuất Landing Page hàng loạt (Factory)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
        run: python scripts/factory.py

      - name: 🚀 Bước 6: Xuất bản toàn cầu (Deploy)
        run: |
          git config --global user.name "Tam-Van-Phuc-AI-Manager"
          git config --global user.email "manager@tamvanphuc.com"
          git add .
          # Kiểm tra xem có gì mới để cập nhật không
          if git diff --staged --quiet; then
            echo "Không có thay đổi mới từ Affitor."
          else
            git commit -m "🚀 [Tâm Vạn Phúc Hub] Cập nhật hệ thống đa ngách: $(date)"
            git push
          fi
