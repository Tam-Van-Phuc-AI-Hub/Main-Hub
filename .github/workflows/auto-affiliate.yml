name: "TAM-VAN-PHUC-DAILY-FACTORY"

on:
  schedule:
    # Cấu hình quét mỗi ngày một lần vào lúc 00:00 UTC (tức 07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  workflow_dispatch: # Vẫn giữ nút bấm tay khi cần chạy gấp

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  production-line:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Engines
        run: pip install -q google-genai beautifulsoup4 requests

      - name: Daily Market Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/scanner.py

      - name: Daily Factory Production
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
        run: python scripts/factory.py

      - name: Deploy Update
        run: |
          git config --global user.name "Tam-Van-Phuc-AI-Manager"
          git config --global user.email "manager@tamvanphuc.com"
          git add .
          if git diff --staged --quiet; then
            echo "Không có sản phẩm mới nào từ Affitor hôm nay."
          else
            git commit -m "📅 Cập nhật tự động hàng ngày: $(date)"
            git push
          fi
