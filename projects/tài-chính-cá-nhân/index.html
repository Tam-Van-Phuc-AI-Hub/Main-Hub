From the information, the general form of the sine wave is \(y = C + A \sin(zt + \theta)\).
The peak value is \(y_{max} = C + A\). We are given \(y_{max} = 1500\).
The trough value is \(y_{min} = C - A\). We are given \(y_{min} = 100\).

We have a system of two linear equations with two variables, \(C\) and \(A\):
1) \(C + A = 1500\)
2) \(C - A = 100\)

Add equation (1) and equation (2):
\((C + A) + (C - A) = 1500 + 100\)
\(2C = 1600\)
\(C = \frac{1600}{2}\)
\(C = 800\)

Substitute \(C = 800\) into equation (1):
\(800 + A = 1500\)
\(A = 1500 - 800\)
\(A = 700\)

So, the values are \(C = 800\) and \(A = 700\).

The final answer is $\boxed{A=700, C=800}$.
