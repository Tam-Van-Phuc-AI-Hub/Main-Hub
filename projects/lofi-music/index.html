<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Vibes - Tâm Vạn Phúc</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Montserrat:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #7a9e9f; /* A muted teal/blue */
            --secondary-color: #c8d8e4; /* Light blue-grey */
            --text-color: #f0f4f8; /* Off-white */
            --accent-color: #e0ac9a; /* Soft coral */
            --dark-color: #2c3e50; /* Dark blue-grey for contrast */
        }

        /* Basic Reset & Body Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%); /* Deep blue gradient */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevent scrollbar for background effect */
            position: relative;
        }

        /* Background Overlay & Animation */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://source.unsplash.com/random/1920x1080/?lofi,chill,aesthetic,rain') no-repeat center center/cover;
            opacity: 0.6; /* Softer background */
            animation: fadeInBackground 2s ease-in-out forwards;
            z-index: -1;
        }

        @keyframes fadeInBackground {
            from { opacity: 0; }
            to { opacity: 0.6; }
        }

        /* Hero Section */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
            margin: auto;
            background-color: rgba(30, 40, 50, 0.75); /* Semi-transparent dark overlay */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: slideInUp 1s ease-out forwards;
            position: relative; /* For the subtle glow effect */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Subtle inner glow */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-section h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            color: var(--secondary-color);
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            line-height: 1.2;
        }

        .hero-section p {
            font-family: 'Roboto', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 700px;
            line-height: 1.6;
            color: var(--text-color);
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
        }

        .cta-button {
            display: inline-block;
            background: var(--accent-color);
            color: var(--dark-color);
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background: #f7bb97; /* Slightly brighter coral */
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }

        .cta-button:active {
            transform: translateY(-2px) scale(0.99);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 1rem;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
            }
            .hero-section p {
                font-size: 1.1rem;
                margin-bottom: 2rem;
            }
            .cta-button {
                padding: 1rem 2.5rem;
                font-size: 1.2rem;
            }
            .hero-section {
                padding: 1.5rem;
                margin: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-section h1 {
                font-size: 2rem;
            }
            .hero-section p {
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }
            .cta-button {
                padding: 0.8rem 2rem;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <main class="hero-section">
        <h1>Lắng Nghe Tâm Hồn<br>Hòa Mình Vào Âm Nhạc Lofi</h1>
        <p>Khám phá không gian bình yên, tập trung và thư giãn. Tuyển tập lofi độc quyền từ Tâm Vạn Phúc sẽ xoa dịu tâm trí bạn, giúp bạn tìm thấy sự cân bằng và cảm hứng trong cuộc sống.</p>
        <a href="afl_b08327f13ac81560aef9d64707d0592420ac9cda" class="cta-button">Khám Phá Ngay</a>
    </main>

    <footer class="footer">
        &copy; 2023 Tâm Vạn Phúc. Mọi quyền được bảo lưu.
    </footer>
</body>
</html>
