<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental-AI: Giải Phóng Tâm Trí - Hệ Sinh Thái Tâm Vạn Phúc</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a0572; /* Deep violet */
            --secondary-color: #9c27b0; /* Lighter violet */
            --accent-color: #e0f2f1; /* Light teal/mint */
            --text-color: #333;
            --light-text-color: #f8f8f8;
            --background-color: #f4f7f6;
            --button-bg: #8e24aa; /* Purple */
            --button-hover-bg: #6a1b9a; /* Darker purple */
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: var(--light-text-color);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 4px var(--shadow);
        }

        header .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--light-text-color);
        }

        header .tagline {
            font-size: 1.1em;
            font-weight: 300;
            color: var(--accent-color);
        }

        .hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--light-text-color);
            padding: 80px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em;
            margin-bottom: 20px;
            line-height: 1.2;
            max-width: 900px;
        }

        .hero p {
            font-size: 1.4em;
            max-width: 800px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--button-bg);
            color: var(--light-text-color);
            padding: 18px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.3em;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .cta-button:hover {
            background-color: var(--button-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .section {
            padding: 60px 0;
            text-align: center;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8em;
            color: var(--primary-color);
            margin-bottom: 40px;
            position: relative;
        }

        .section h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background-color: var(--secondary-color);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 50px;
            text-align: left;
        }

        .feature-item {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }

        .feature-item h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8em;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .feature-item h3 svg {
            margin-right: 15px;
            color: var(--button-bg);
        }

        .feature-item p {
            font-size: 1.1em;
            color: #555;
        }

        .cta-section {
            background: linear-gradient(to right, var(--secondary-color), var(--primary-color));
            color: var(--light-text-color);
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .cta-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Dark overlay for text readability */
            z-index: -1;
        }

        .cta-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            margin-bottom: 25px;
            color: var(--light-text-color);
        }

        .cta-section p {
            font-size: 1.3em;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }


        footer {
            background-color: var(--primary-color);
            color: var(--light-text-color);
            text-align: center;
            padding: 30px 0;
            font-size: 0.9em;
            box-shadow: 0 -2px 4px var(--shadow);
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: white;
        }

        /* Responsive adjustments */
        @media (max-width: 900px) {
            .hero h1 {
                font-size: 2.8em;
            }
            .hero p {
                font-size: 1.2em;
            }
            .section h2 {
                font-size: 2.2em;
            }
            .cta-button {
                font-size: 1.1em;
                padding: 15px 30px;
            }
        }

        @media (max-width: 600px) {
            header .logo {
                font-size: 2em;
            }
            header .tagline {
                font-size: 0.9em;
            }
            .hero {
                padding: 60px 20px;
            }
            .hero h1 {
                font-size: 2.2em;
            }
            .hero p {
                font-size: 1em;
            }
            .section {
                padding: 40px 0;
            }
            .section h2 {
                font-size: 1.8em;
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
            .feature-item {
                padding: 25px;
            }
            .feature-item h3 {
                font-size: 1.5em;
            }
            .feature-item p {
                font-size: 1em;
            }
            .cta-section h2 {
                font-size: 2.5em;
            }
            .cta-section p {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Tâm Vạn Phúc</div>
            <div class="tagline">Hệ sinh thái cho sự phát triển toàn diện</div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Giải Phóng Tâm Trí, Khai Phá Tiềm Năng Vô Hạn Với Mental-AI</h1>
            <p>Sức mạnh đột phá của Trí tuệ nhân tạo kết hợp với sự thấu hiểu sâu sắc về tâm lý con người, mang đến hạnh phúc nội tại và phát triển toàn diện cho bạn.</p>
            <a href="https://tamvanphuc.com/mental-ai
